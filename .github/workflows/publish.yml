name: Publish to npm

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    id-token: write

concurrency:
    group: npm-publish-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        if: github.repository == 'plasmabit/dossier-typescript'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  package-manager-cache: false

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Verify tag matches package version
              run: node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.GITHUB_REF_NAME !== expected) { console.error('Tag ' + process.env.GITHUB_REF_NAME + ' does not match package version ' + expected); process.exit(1); }"

            - name: Run CI checks
              run: npm run ci

            - name: Publish package
              run: npm publish
